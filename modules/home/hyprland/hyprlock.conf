# Hyprlock - Black with white outline

background {
    monitor =
    color = rgba(0, 0, 0, 1.0)
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    halign = center
    valign = center
    placeholder_text = password
    font_family = JetBrains Mono
    fade_on_empty = true
    hide_input = false
    inner_color = rgba(0, 0, 0, 1.0)
    outer_color = rgba(255, 255, 255, 1.0)
    font_color = rgba(255, 255, 255, 1.0)
    check_color = rgba(255, 255, 255, 0.6)
    fail_color = rgba(0, 0, 0, 1.0)
    fail_text = wrong password
    capslock_color = rgba(255, 255, 255, 0.6)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 1.0)
    font_family = JetBrains Mono Bold
    font_size = 120
    position = 0, 120
    halign = center
    valign = center
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_size = 2
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B')"
    color = rgba(255, 255, 255, 1.0)
    font_family = JetBrains Mono
    font_size = 16
    position = 0, 60
    halign = center
    valign = center
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_size = 2
}
