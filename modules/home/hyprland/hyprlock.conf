# Hyprlock - Minimal Dark Lock Screen

general {
    grace = 0
    no_fade_in = false
}

input {
    kb_layout = us
    kb_model =
    kb_options =
    kb_rules =
    external_command = hyprctl keyword input:kb_layout us 2>/dev/null || true
}

background {
    monitor =
    path = /home/zumuvik/Pictures/wallpapers/lock.jpg
    blur_passes = 5
    blur_size = 15
    noise = 0.02
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.15
    color = rgba(10, 10, 15, 1.0)
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 1
    inner_margin = 15, 10
    outer_margin = 0, 40
    border_radius = 8
    halign = center
    valign = center
    placeholder_text = password...
    font_family = JetBrains Mono
    font_size = 16
    fade_on_empty = true
    inner_color = rgba(255, 255, 255, 0.05)
    outer_color = rgba(255, 255, 255, 0.3)
    border_color = rgba(255, 255, 255, 0.2)
    font_color = rgba(255, 255, 255, 1.0)
}

label {
    monitor =
    text = EN
    color = rgba(255, 255, 255, 0.7)
    font_family = JetBrains Mono
    font_size = 14
    font_weight = 600
    position = -160, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = Hyprland
    color = rgba(255, 255, 255, 0.4)
    font_family = JetBrains Mono
    font_size = 12
    position = 0, -50
    halign = center
    valign = center
}
